version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: dynamique-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dynamique_rdc
    networks:
      - dynamique-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dynamique-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/dynamique_rdc
      JWT_SECRET: dynamique_jwt_secret_production_2025
      JWT_REFRESH_SECRET: dynamique_refresh_secret_production_2025
      JWT_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - dynamique-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dynamique-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - dynamique-network

volumes:
  mongo_data:

networks:
  dynamique-network:
    driver: bridge
